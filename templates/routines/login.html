{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-12 bg-white p-8 rounded-2xl shadow-md border border-gray-200">
    <div class="text-center mb-6 space-y-2">
        <h2 class="text-2xl font-black text-gray-900 tracking-tight">Management Sign In</h2>
        <p class="text-xs text-gray-500">Authorized Faculty Admins, Dept Admins, and Teachers only.</p>
    </div>

    <form method="POST" action="{% url 'login' %}" class="space-y-5">
        {% csrf_token %}
        
        <div>
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Username / Login ID</label>
            <input type="text" name="username" required autocomplete="username" placeholder="e.g., arch_admin or teacher_id"
                   class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Security Account Password</label>
            <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••"
                   class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <button type="submit" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-3 px-4 rounded-lg text-sm transition-all shadow-md">
            Sign In to System
        </button>
    </form>
</div>
{% endblock content %}
